services:
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    restart: unless-stopped
    networks:
      - monitoring
      - taskflow_network

  grafana:
    env_file:
      - ../../.env
    image: grafana/grafana:11.5.2
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ../../infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../../infra/monitoring/grafana/taskflow-dashboard.json:/tmp/taskflow-dashboard.json:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--output-document=-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - monitoring
      - taskflow_network

  grafana-setup:
    image: curlimages/curl:8.11.1
    container_name: grafana-setup
    env_file:
      - ../../.env
    depends_on:
      grafana:
        condition: service_healthy
    volumes:
      - ../../infra/monitoring/grafana/taskflow-dashboard.json:/tmp/taskflow-dashboard.json:ro
    command:
      - sh
      - -c
      - |
        set -e
        echo 'Checking if TaskFlow dashboard exists...'
        STATUS=$$(curl -s -o /dev/null -w "%{http_code}" \
          "http://grafana:3000/api/dashboards/uid/taskflow-api" \
          -u "$$GRAFANA_ADMIN_USER:$$GRAFANA_ADMIN_PASSWORD")
        if [ "$$STATUS" = "200" ]; then
          echo 'Dashboard already exists, skipping.'
        else
          echo 'Importing TaskFlow dashboard...'
          printf '{"dashboard":' > /tmp/payload.json
          cat /tmp/taskflow-dashboard.json >> /tmp/payload.json
          printf ',"overwrite":true,"folderId":0}' >> /tmp/payload.json
          curl -sf -X POST "http://grafana:3000/api/dashboards/db" \
            -H "Content-Type: application/json" \
            -u "$$GRAFANA_ADMIN_USER:$$GRAFANA_ADMIN_PASSWORD" \
            -d @/tmp/payload.json
          echo 'Dashboard imported successfully.'
        fi
    restart: "no"
    networks:
      - monitoring

  alertmanager:
    build:
      context: ./alertmanager
      dockerfile: Dockerfile
    environment:
      - DISCORD_WEBHOOK_URL_CRITICAL=${DISCORD_WEBHOOK_URL_CRITICAL}
      - DISCORD_WEBHOOK_URL_WARNINGS=${DISCORD_WEBHOOK_URL_WARNINGS}
      - SLACK_WEBHOOK_URL_CRITICAL=${SLACK_WEBHOOK_URL_CRITICAL}
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.tmpl:ro
    restart: unless-stopped
    networks:
      - monitoring
      - taskflow_network

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    restart: unless-stopped
    networks:
      - monitoring
      - taskflow_network

networks:
  monitoring:
    driver: bridge
    name: monitoring
  taskflow_network:
    external: true
    name: ${TASKFLOW_NETWORK_NAME:-taskflow_net}

volumes:
  grafana-storage:
