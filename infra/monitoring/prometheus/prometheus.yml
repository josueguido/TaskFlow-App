global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'backend'
    scrape_interval: 15s
    static_configs:
      - targets: ['backend:3003']
    metrics_path: '/metrics'

