services:
  elasticsearch:
    image: elasticsearch:9.2.3
    container_name: elasticsearch
    ports:
      - "9200:9200"
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - monitoring

  kibana:
    image: kibana:9.2.3
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q available || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - monitoring

  kibana-setup:
    image: curlimages/curl:8.11.1
    container_name: kibana-setup
    depends_on:
      kibana:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        echo 'Checking if TaskFlow Data View exists...'
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          'http://kibana:5601/api/data_views/data_view/taskflow-*' \
          -H 'kbn-xsrf: true')
        if [ "$STATUS" = "200" ]; then
          echo 'Data View already exists, skipping.'
        else
          echo 'Creating taskflow-* Data View...'
          curl -sf -X POST 'http://kibana:5601/api/data_views/data_view' \
            -H 'Content-Type: application/json' \
            -H 'kbn-xsrf: true' \
            -d '{"data_view":{"title":"taskflow-*","timeFieldName":"@timestamp","name":"TaskFlow Logs"}}'
          echo 'Data View created successfully.'
        fi
    restart: "no"
    networks:
      - monitoring

  logstash:
    image: logstash:9.2.3
    container_name: logstash
    ports:
      - "5044:5044"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    environment:
      - xpack.monitoring.enabled=true
      - xpack.monitoring.elasticsearch.hosts=http://elasticsearch:9200
      - xpack.security.enabled=false
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitoring

  filebeat:
    build:
      context: ./filebeat
      dockerfile: Dockerfile
    container_name: filebeat
    user: root
    volumes:
      # Acceso a Docker socket para metadata
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Acceso a logs de Docker
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: ["filebeat", "-e", "-E", "logging.level=info"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
