input {
  beats {
    port => 5044
  }
}

filter {
  # Parsear logs de Docker
  if [type] == "docker" or [docker] {
    # Si el mensaje es JSON válido, parsearlo
    json {
      source => "message"
      skip_on_invalid_json => true
      target => "json_parsed"
    }

    # Agregar información del contenedor de Docker
    if [docker][container][name] {
      mutate {
        add_field => { "container_name" => "%{[docker][container][name]}" }
      }
    }
  }

  # Agregar timestamp si no existe
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "taskflow-%{+YYYY.MM.dd}"
    # Sin credenciales porque Elasticsearch tiene xpack.security.enabled=false
  }

  # Opcional: ver logs en consola para debug
  stdout {
    codec => rubydebug
  }
}
