input {
  beats {
    port => 5044
  }
}

filter {
  # Paso 1: El campo 'message' contiene el wrapper JSON de Docker:
  # {"log":"<contenido>\n","stream":"stdout","time":"..."}
  # Parsearlo en un campo temporal para no contaminar root
  json {
    source => "message"
    target => "docker_wrapper"
    skip_on_invalid_json => true
  }

  # Paso 2: Extraer el campo 'log' del wrapper, limpiar el \n y parsear como Winston JSON
  if [docker_wrapper][log] {
    mutate {
      add_field => { "raw_log" => "%{[docker_wrapper][log]}" }
    }
    mutate {
      strip => ["raw_log"]
    }
    json {
      source => "raw_log"
      target => "parsed"
      skip_on_invalid_json => true
    }
  }

  # Nombre del contenedor (para poder filtrar en Kibana si se desea)
  if [container][name] {
    mutate {
      add_field => { "container_name" => "%{[container][name]}" }
    }
  }

  # Paso 3: Si el parseo de Winston tuvo exito (tiene campo level), promover los campos a root
  if [parsed][level] {
    mutate {
      add_field => {
        "level"         => "%{[parsed][level]}"
        "log_message"   => "%{[parsed][message]}"
        "service"       => "%{[parsed][service]}"
        "environment"   => "%{[parsed][environment]}"
        "log_timestamp" => "%{[parsed][timestamp]}"
      }
    }
    if [parsed][requestId]  { mutate { add_field => { "requestId"  => "%{[parsed][requestId]}"  } } }
    if [parsed][userId]     { mutate { add_field => { "userId"     => "%{[parsed][userId]}"     } } }
    if [parsed][method]     { mutate { add_field => { "method"     => "%{[parsed][method]}"     } } }
    if [parsed][route]      { mutate { add_field => { "route"      => "%{[parsed][route]}"      } } }
    if [parsed][statusCode] { mutate { add_field => { "statusCode" => "%{[parsed][statusCode]}" } } }
    if [parsed][duration]   { mutate { add_field => { "duration"   => "%{[parsed][duration]}"   } } }
    if [parsed][ip]         { mutate { add_field => { "ip"         => "%{[parsed][ip]}"         } } }
    if [parsed][hostname]   { mutate { add_field => { "hostname"   => "%{[parsed][hostname]}"   } } }
    if [parsed][action]     { mutate { add_field => { "action"     => "%{[parsed][action]}"     } } }

    mutate {
      remove_field => ["raw_log", "parsed", "docker_wrapper", "message"]
    }
  } else {
    # No es JSON de Winston — descartar (postgres, redis, nginx, ES, etc.)
    drop { }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "taskflow-%{+YYYY.MM.dd}"
  }
}
