name: Release (tags -> Docker Hub)

on:
  push:
    tags:
      - "frontend-v*.*.*"
      - "backend-v*.*.*"
      - "taskflow-frontend-v*.*.*"
      - "taskflow-backend-v*.*.*"

env:
  REGISTRY: docker.io
  IMAGE_NAME_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend
  IMAGE_NAME_BACKEND: ${{ secrets.DOCKER_USERNAME }}/taskflow-backend

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Parse tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          case "$TAG" in
            frontend-v*)
              COMPONENT="frontend"
              VERSION="${TAG#frontend-v}"
              ;;
            backend-v*)
              COMPONENT="backend"
              VERSION="${TAG#backend-v}"
              ;;
            taskflow-frontend-v*)
              COMPONENT="frontend"
              VERSION="${TAG#taskflow-frontend-v}"
              ;;
            taskflow-backend-v*)
              COMPONENT="backend"
              VERSION="${TAG#taskflow-backend-v}"
              ;;
            *)
              echo "::error::Unknown tag format: $TAG"
              exit 1
              ;;
          esac

          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Frontend
        if: steps.tag.outputs.component == 'frontend'
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
          build-args: |
            APP_VERSION=${{ steps.tag.outputs.version }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend
        if: steps.tag.outputs.component == 'backend'
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          build-args: |
            APP_VERSION=${{ steps.tag.outputs.version }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
