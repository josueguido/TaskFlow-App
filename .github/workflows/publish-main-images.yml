name: Publish Main Images (latest + sha)

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/publish-main-images.yml"
  workflow_dispatch:
    inputs:
      publish_frontend:
        description: "Publish frontend image"
        required: true
        type: boolean
        default: true
      publish_backend:
        description: "Publish backend image"
        required: true
        type: boolean
        default: true

concurrency:
  group: publish-main-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend
  IMAGE_NAME_BACKEND: ${{ secrets.DOCKER_USERNAME }}/taskflow-backend

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      publish_frontend: ${{ steps.flags.outputs.publish_frontend }}
      publish_backend: ${{ steps.flags.outputs.publish_backend }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

      - name: Resolve publish flags
        id: flags
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "publish_frontend=${{ inputs.publish_frontend }}" >> "$GITHUB_OUTPUT"
            echo "publish_backend=${{ inputs.publish_backend }}" >> "$GITHUB_OUTPUT"
          else
            echo "publish_frontend=${{ steps.changes.outputs.frontend }}" >> "$GITHUB_OUTPUT"
            echo "publish_backend=${{ steps.changes.outputs.backend }}" >> "$GITHUB_OUTPUT"
          fi

  frontend:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.publish_frontend == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:sha-${{ github.sha }}
          build-args: |
            APP_VERSION=sha-${{ github.sha }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.publish_backend == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:sha-${{ github.sha }}
          build-args: |
            APP_VERSION=sha-${{ github.sha }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
